site_name: Digity SDK
site_url: https://docs.digity.de/
repo_url: https://github.com/digity-cristobalcorral/digity-sdk
repo_name: digity-sdk
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: null
  custom_dir: theme

extra_css:
  - assets/site.css
  - assets/docs.css

extra_javascript:
  - assets/docs.js

nav:
  - Getting Started:
    - What is Chiros: what-is-chiros.md
    - Hardware overview: hardware-overview.md
    - Quickstart: index.md
    - System requirements: system-requirements.md
  - SDK:
    - Core concepts: sdk-core-concepts.md
    - API reference: sdk-api-reference.md
    - Changelog: changelog.md
  - Hardware Reference:
    - Finger architecture: finger-architecture.md
  - Guides:
    - Bimanual recording: guide-bimanual.md
  - Integrations:
    - ROS2: integrations-ros2.md
  - Support:
    - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - fenced_code
