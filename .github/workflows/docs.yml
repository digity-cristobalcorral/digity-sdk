name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "theme/**"
      - "mkdocs.yml"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Check SDK version in changelog
        run: |
          SDK_VER=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SDK version: $SDK_VER"
          if ! grep -q "$SDK_VER" docs/changelog.md; then
            echo "::warning::SDK $SDK_VER not found in changelog.md — remember to update it!"
          fi

      - name: Build docs
        run: mkdocs build --clean

      - name: Add CNAME
        run: echo "docs.digity.de" > site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
