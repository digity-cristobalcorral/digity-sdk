name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "theme/**"
      - "mkdocs.yml"
      - "scripts/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs

      - name: Remove README.md added by GitBook
        run: rm -f docs/README.md

      - name: Sync nav from SUMMARY.md
        run: python3 scripts/sync_nav.py

      - name: Remove GitBook-only files from docs build
        run: rm -f docs/SUMMARY.md docs/CNAME

      - name: Check SDK version in changelog
        run: |
          SDK_VER=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "SDK version: $SDK_VER"
          if ! grep -q "$SDK_VER" docs/changelog.md; then
            echo "::warning::SDK $SDK_VER not found in changelog.md — remember to update it!"
          fi

      - name: Build docs
        run: mkdocs build --clean

      - name: Deploy to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 194.164.49.25 >> ~/.ssh/known_hosts
          scp -i ~/.ssh/deploy_key -r site/. \
            Administrator@194.164.49.25:"C:/inetpub/vhosts/digity.de/docs.digity.de/"
